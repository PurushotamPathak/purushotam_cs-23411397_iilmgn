<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar light">
    <div class="logo">🌤 WeatherAI</div>
    <a href="/">← Back</a>
</nav>

<div class="dashboard">

    <!-- City Header -->
    <div class="city-box">
        <h1>{{ city }}</h1>
        <p>Weather overview and AI predictions</p>
    </div>

    <!-- Cards -->
    <div class="cards">

        <!-- Past -->
        <div class="card">
            <h2>Past Temperature</h2>

            {% for i in range(dates|length) %}
            <div class="row">
                <span>{{ dates[i] }}</span>
                <span>{{ temps[i] }} °C</span>
            </div>
            {% endfor %}
        </div>

        <!-- Prediction -->
        <div class="card highlight">
            <h2>Prediction</h2>

            {% for i in range(future_dates|length) %}
            <div class="row">
                <span>{{ future_dates[i] }}</span>
                <span>{{ future_preds[i] }} °C</span>
            </div>
            {% endfor %}
        </div>

    </div>

</div>

</body>
</html>
